# Feature Registry
# All features consumed by any model must be registered here.
# No model may consume an unregistered feature.
# Format: feature_name → source, formula, refresh frequency, consuming models

---

## Price-Derived Features

rsi_14:
  source: prices
  formula: "RSI(close, period=14)"
  refresh: daily
  used_by: [swing_model, positional_model]

rsi_9:
  source: prices
  formula: "RSI(close, period=9)"
  refresh: daily
  used_by: [swing_model]

macd_line:
  source: prices
  formula: "EMA(close, 12) - EMA(close, 26)"
  refresh: daily
  used_by: [swing_model]

macd_signal:
  source: prices
  formula: "EMA(macd_line, 9)"
  refresh: daily
  used_by: [swing_model]

macd_hist:
  source: prices
  formula: "macd_line - macd_signal"
  refresh: daily
  used_by: [swing_model]

macd_hist_prev:
  source: prices
  formula: "macd_hist shifted by 1 day"
  refresh: daily
  used_by: [swing_model]

adx_14:
  source: prices
  formula: "ADX(high, low, close, period=14)"
  refresh: daily
  used_by: [swing_model, positional_model]

adx_prev:
  source: prices
  formula: "adx_14 shifted by 1 day"
  refresh: daily
  used_by: [swing_model, positional_model]

ema_5:
  source: prices
  formula: "EMA(close, period=5)"
  refresh: daily
  used_by: [swing_model]

ema_13:
  source: prices
  formula: "EMA(close, period=13)"
  refresh: daily
  used_by: [swing_model]

ema_20:
  source: prices
  formula: "EMA(close, period=20)"
  refresh: daily
  used_by: [swing_model]

ema_50:
  source: prices
  formula: "EMA(close, period=50)"
  refresh: daily
  used_by: [positional_model, lt_model]

ema_150:
  source: prices
  formula: "EMA(close, period=150)"
  refresh: daily
  used_by: [positional_model]

ema_200:
  source: prices
  formula: "EMA(close, period=200)"
  refresh: daily
  used_by: [positional_model, lt_model]

atr_14:
  source: prices
  formula: "ATR(high, low, close, period=14)"
  refresh: daily
  used_by: [swing_model, backtest_engine]
  notes: "Used for stop loss calculation: entry - 1.5 * ATR"

bb_upper:
  source: prices
  formula: "BBANDS(close, period=20, nbdevup=2).upper"
  refresh: daily
  used_by: [swing_model]

bb_mid:
  source: prices
  formula: "BBANDS(close, period=20).mid"
  refresh: daily
  used_by: [swing_model]

bb_lower:
  source: prices
  formula: "BBANDS(close, period=20, nbdevdn=2).lower"
  refresh: daily
  used_by: [swing_model]

bb_width:
  source: prices
  formula: "(bb_upper - bb_lower) / bb_mid"
  refresh: daily
  used_by: [swing_model]

bb_width_20avg:
  source: prices
  formula: "ROLLING_MEAN(bb_width, 20)"
  refresh: daily
  used_by: [swing_model]

bb_pct:
  source: prices
  formula: "(close - bb_lower) / (bb_upper - bb_lower)"
  refresh: daily
  used_by: [swing_model]

stoch_k:
  source: prices
  formula: "STOCH(high, low, close).slowk"
  refresh: daily
  used_by: [swing_model]

stoch_d:
  source: prices
  formula: "STOCH(high, low, close).slowd"
  refresh: daily
  used_by: [swing_model]

volume_20avg:
  source: prices
  formula: "ROLLING_MEAN(volume, 20)"
  refresh: daily
  used_by: [swing_model]

volume_ratio:
  source: prices
  formula: "volume / volume_20avg"
  refresh: daily
  used_by: [swing_model, recommendation_history]

avg_traded_value:
  source: prices
  formula: "close * volume"
  refresh: daily
  used_by: [ingestion_validator]

is_eligible:
  source: prices
  formula: "avg_traded_value_20d >= 100000000 AND volume_20avg >= 100000 AND close >= 10"
  refresh: daily
  used_by: [ingestion_validator]

high_52w:
  source: prices
  formula: "ROLLING_MAX(high, 252)"
  refresh: daily
  used_by: [swing_model]

low_52w:
  source: prices
  formula: "ROLLING_MIN(low, 252)"
  refresh: daily
  used_by: [swing_model]

pct_from_52w_high:
  source: prices
  formula: "(close - high_52w) / high_52w * 100"
  refresh: daily
  used_by: [swing_model, lt_model]

distance_from_52w_high:
  source: prices
  formula: "high_52w - close"
  refresh: daily
  used_by: [swing_model, lt_model]

pct_from_52w_low:
  source: prices
  formula: "(close - low_52w) / low_52w * 100"
  refresh: daily
  used_by: [swing_model]

is_52w_breakout:
  source: prices
  formula: "close >= high_52w"
  refresh: daily
  used_by: [swing_model, lt_model]

---

## Relative Strength Features

rs_vs_nifty_20d:
  source: prices
  formula: "stock_return_20d / nifty500_return_20d"
  refresh: daily
  used_by: [swing_model, positional_model]
  notes: "Values > 1.0 = outperforming Nifty500"

rs_vs_nifty_60d:
  source: prices
  formula: "stock_return_60d / nifty500_return_60d"
  refresh: daily
  used_by: [positional_model, lt_model]

rs_rank_pct:
  source: prices
  formula: "PERCENTILE_RANK(rs_vs_nifty_20d) across NSE500 on that date"
  refresh: daily
  used_by: [swing_model, positional_model, lt_model, recommendation_history]

rs_vs_sector_20d:
  source: prices
  formula: "stock_return_20d / sector_avg_return_20d"
  refresh: daily
  used_by: [swing_model]

---

## Sector Features

sector_return_1m:
  source: sector_prices
  formula: "avg return of all stocks in sector over 21 trading days"
  refresh: daily
  used_by: [positional_model, lt_model]

sector_return_3m:
  source: sector_prices
  formula: "avg return of all stocks in sector over 63 trading days"
  refresh: daily
  used_by: [positional_model]

sector_return_6m:
  source: sector_prices
  formula: "avg return of all stocks in sector over 126 trading days"
  refresh: daily
  used_by: [lt_model]

sector_3m_rank:
  source: sector_prices
  formula: "RANK of sector by sector_return_3m (1 = best)"
  refresh: daily
  used_by: [positional_model, recommendation_history]

sector_6m_rank:
  source: sector_prices
  formula: "RANK of sector by sector_return_6m (1 = best)"
  refresh: daily
  used_by: [lt_model, recommendation_history]

sector_strength:
  source: sector_prices
  formula: "composite of sector_return_1m * 0.5 + sector_return_3m * 0.3 + sector_return_6m * 0.2"
  refresh: daily
  used_by: [recommendation_history]

---

## Fundamental Features
# Source: fundamentals table. Apply 5-day lag rule — only use data
# where announced_date <= signal_date - 5 trading days.

revenue_cagr_3y:
  source: fundamentals
  formula: "(revenue_latest / revenue_3y_ago) ^ (1/3) - 1"
  refresh: quarterly
  used_by: [lt_model, positional_model]

pat_cagr_3y:
  source: fundamentals
  formula: "(pat_latest / pat_3y_ago) ^ (1/3) - 1"
  refresh: quarterly
  used_by: [lt_model]

pat_yoy_pct:
  source: fundamentals
  formula: "(pat_latest_quarter / pat_same_quarter_prev_year - 1) * 100"
  refresh: quarterly
  used_by: [positional_model]

roe:
  source: fundamentals
  formula: "pat_ttm / avg_equity_ttm * 100"
  refresh: quarterly
  used_by: [positional_model, lt_model]

roce:
  source: fundamentals
  formula: "ebit_ttm / capital_employed * 100"
  refresh: quarterly
  used_by: [lt_model]

debt_equity:
  source: fundamentals
  formula: "total_debt / total_equity"
  refresh: quarterly
  used_by: [positional_model, lt_model]

pe_ratio:
  source: fundamentals
  formula: "market_cap / pat_ttm"
  refresh: daily
  used_by: [lt_model]

sector_median_pe:
  source: fundamentals + sector_master
  formula: "MEDIAN(pe_ratio) of all stocks in same sector"
  refresh: daily
  used_by: [lt_model]

promoter_pct:
  source: fundamentals
  formula: "promoter_holding_pct from shareholding pattern"
  refresh: quarterly
  used_by: [lt_model]
